name: Android CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: List files
      run: ls -la

    - name: Build debug APK
      run: |
        ./gradlew assembleDebug --warning-mode all 2>&1 || true
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK not found"

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
